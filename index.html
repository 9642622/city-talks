      <option value="nova">Голос: Nova</option>

<script>
const $ = s => document.querySelector(s);
function log(...a){ const t=new Date().toLocaleTimeString(); const line='['+t+'] '+a.map(x=>typeof x==='object'?JSON.stringify(x):String(x)).join(' '); const box=$('#logBox'); if(box){ box.textContent+=line+'\n'; box.scrollTop=box.scrollHeight; } console.log('[log]',...a); }
window.addEventListener('error', e=>log('JS ERROR:', e.message, (e.filename||'')+':'+(e.lineno||'')));
window.addEventListener('unhandledrejection', e=>log('PROMISE REJECT:', (e.reason&&e.reason.message)?e.reason.message:e.reason));
addEventListener('DOMContentLoaded',()=>{ $('#logCopy').onclick=()=>{ navigator.clipboard&&navigator.clipboard.writeText($('#logBox').textContent); log('(лог скопирован)'); }; $('#logClear').onclick=()=>{ $('#logBox').textContent=''; }; });
const key = $('#key');
// привязываем поля к localStorage
const persist = (el, k) => { const v = localStorage.getItem(k); if (v !== null) el.value = v; el.addEventListener('change', () => localStorage.setItem(k, el.value.trim())); };
persist(key, 'anthropic_key');
persist($('#openaiKey'), 'openai_key');
persist($('#ttsVoice'), 'openai_voice');
persist($('#ttsInstructions'), 'openai_instructions');
if (!key.value) $('#setup').open = true;

const wiki = () => $('#wikiLang').value;

// город → (поиск статьи) → координаты → ближайшие места
$('#cityBtn').onclick = async () => {
  const city = $('#city').value.trim() || 'Рига';
  $('#status').textContent = `Ищу центр города «${city}»…`;
  // сначала находим точное название статьи поиском — устойчиво к языку/написанию
  const s = await fetch(`https://${wiki()}.wikipedia.org/w/api.php?action=query&list=search` +
    `&srsearch=${encodeURIComponent(city)}&srlimit=1&format=json&origin=*`).then(r => r.json());
  const title = s.query?.search?.[0]?.title;
  if (!title) { $('#status').textContent = `Не нашёл город «${city}». Смени язык источников.`; return; }
  const c = await fetch(`https://${wiki()}.wikipedia.org/w/api.php?action=query&prop=coordinates` +
    `&titles=${encodeURIComponent(title)}&redirects=1&format=json&origin=*`).then(r => r.json());
  const co = Object.values(c.query?.pages || {})[0]?.coordinates?.[0];
  if (!co) { $('#status').textContent = `У статьи «${title}» нет координат. Впиши название точнее.`; return; }
  await findPlaces(co.lat, co.lon);
};

async function findPlaces(lat, lon) {
  $('#status').textContent = 'Ищу известные места…';
  const r = await fetch(`https://${wiki()}.wikipedia.org/w/api.php?action=query&list=geosearch` +
    `&gscoord=${lat}|${lon}&gsradius=2000&gslimit=25&format=json&origin=*`).then(r => r.json());
  const list = r.query?.geosearch || [];
  render(list.map(p => p.title), `Нашёл ${list.length} мест. Тапни любое:`);
}

// поиск конкретного объекта по названию
$('#searchBtn').onclick = async () => {
  const q = $('#q').value.trim();
  if (!q) return;
  $('#status').textContent = `Ищу «${q}»…`;
  // устойчивость к опечаткам: нечёткий поиск (~) на каждое слово + контекст города
  const city = $('#city').value.trim();
  const fuzzy = q.split(/\s+/).map(w => w + '~').join(' ') + (city ? ' ' + city : '');
  const r = await fetch(`https://${wiki()}.wikipedia.org/w/api.php?action=query&list=search` +
    `&srsearch=${encodeURIComponent(fuzzy)}&srlimit=10&format=json&origin=*`).then(r => r.json());
  const titles = (r.query?.search || []).map(s => s.title);
  if (!titles.length) { $('#status').textContent = 'Ничего не нашёл. Попробуй иначе или смени язык источников.'; return; }
  render(titles, `Нашёл по запросу «${q}». Тапни нужное:`);
};

function render(titles, status) {
  $('#status').textContent = status;
  $('#places').innerHTML = '';
  for (const t of titles) {
    const el = document.createElement('div');
    el.className = 'card place';
    el.innerHTML = `<b>${t}</b>`;
    el.onclick = () => askLength(t);
    $('#places').appendChild(el);
  }
}

// ——— распознавание места по фото (Claude Vision) ———
$('#camBtn').onclick = () => $('#camInput').click();
$('#libBtn').onclick = () => $('#libInput').click();
const onPhoto = e => { const f = e.target.files[0]; if (f) recognizeByPhoto(f); e.target.value = ''; };
$('#camInput').addEventListener('change', onPhoto);
$('#libInput').addEventListener('change', onPhoto);

// уменьшаем фото до ~1024px и в jpeg — быстрее и дешевле для API
function loadImageResized(file, maxDim = 1024) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => {
      const scale = Math.min(1, maxDim / Math.max(img.width, img.height));
      const w = Math.round(img.width * scale), h = Math.round(img.height * scale);
      const c = document.createElement('canvas'); c.width = w; c.height = h;
      c.getContext('2d').drawImage(img, 0, 0, w, h);
      resolve(c.toDataURL('image/jpeg', 0.85).split(',')[1]);
    };
    img.onerror = () => reject(new Error('не удалось прочитать изображение'));
    img.src = URL.createObjectURL(file);
  });
}

// имя места → каноничный заголовок статьи Wikipedia (фаззи + контекст города)
async function wikiFirstTitle(q) {
  const city = $('#city').value.trim();
  // убираем скобки/пунктуацию (в них бывает мусор вроде «(Рига, площадь Ливов)»), слова-название оставляем
  const core = q.replace(/\([^)]*\)/g, ' ').replace(/[.,;:!?«»"'()\[\]]/g, ' ').replace(/\s+/g, ' ').trim();
  const search = async srsearch => {
    const r = await fetch(`https://${wiki()}.wikipedia.org/w/api.php?action=query&list=search` +
      `&srsearch=${encodeURIComponent(srsearch)}&srlimit=1&format=json&origin=*`).then(r => r.json());
    return r.query?.search?.[0]?.title || null;
  };
  // 1) обычный поиск + город — лучшая релевантность (Claude пишет название верно)
  let t = await search(core + (city ? ' ' + city : ''));
  if (t) return t;
  // 2) фолбэк с фаззи — на случай опечаток
  return await search(core.split(/\s+/).filter(Boolean).map(w => w + '~').join(' ') + (city ? ' ' + city : ''));
}

async function recognizeByPhoto(file) {
  if (!key.value) { alert('Сначала впиши ключ Anthropic в настройках ⚙️'); $('#setup').open = true; return; }
  ++playToken; stopSpeak();
  startBg();
  $('#player').classList.remove('hidden');
  $('#title').textContent = 'Фото';
  $('#voiceStatus').textContent = '';
  $('#story').textContent = 'Смотрю на фото и определяю место…';
  $('#player').scrollIntoView({ behavior: 'smooth' });
  try {
    const base64 = await loadImageResized(file);
    const cityHint = $('#city').value.trim();
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'content-type': 'application/json', 'x-api-key': key.value.trim(),
                 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6', max_tokens: 150,
        messages: [{ role: 'user', content: [
          { type: 'image', source: { type: 'base64', media_type: 'image/jpeg', data: base64 } },
          { type: 'text', text:
            `На фото — туристический объект. Определи КОНКРЕТНОЕ здание, памятник или достопримечательность.` +
            (cityHint ? ` Скорее всего это город ${cityHint}.` : '') +
            `\nПравила:\n` +
            `- Назови именно конкретный объект (например «Три брата», «Дом Черноголовых», «Пороховая башня»), а НЕ район/улицу/город. «Старый город», «центр Риги», «историческое здание» — так НЕЛЬЗЯ.\n` +
            `- Учитывай вывески, таблички, номера домов, характерные детали фасада.\n` +
            `- Если не уверен на сто процентов — дай ДО ТРЁХ наиболее вероятных вариантов, каждый С НОВОЙ СТРОКИ, самый вероятный первым.\n` +
            `- Только названия на русском, простым текстом: без нумерации, звёздочек и кавычек.\n` +
            `- Если узнаваемой достопримечательности на фото нет — ответь ровно: НЕТ.` }
        ]}]
      })
    });
    const data = await res.json();
    if (data.error) { $('#story').textContent = 'Ошибка распознавания: ' + data.error.message; stopBg(); return; }
    const raw = data.content.map(c => c.text).join('').trim();
    const names = raw.split('\n')
      .map(s => s.replace(/^[\s\-–—•*\d.)]+/, '').replace(/[*_`#>~]/g, '').replace(/^["'«»\s]+|["'«»\s]+$/g, '').trim())
      .filter(Boolean);
    log('📷 распознано: ' + JSON.stringify(names));
    if (!names.length || /^нет\b/i.test(names[0])) {
      $('#story').textContent = 'Не удалось уверенно опознать достопримечательность на фото. Попробуй другой снимок или выбери место вручную.';
      stopBg(); log('✖ фото не опознано'); return;
    }
    // резолвим кандидатов в статьи Wikipedia
    const titles = [];
    for (const n of names.slice(0, 3)) { const t = (await wikiFirstTitle(n)) || n; if (!titles.includes(t)) titles.push(t); }
    log('📷 → кандидаты: ' + JSON.stringify(titles));
    if (titles.length === 1) {
      askLength(titles[0]);                  // уверенно — спросим длину и рассказ
    } else {
      stopSpeak(); stopBg();                 // неуверенно — даём выбрать
      $('#player').classList.add('hidden');
      render(titles, 'По фото — возможно, одно из этих мест. Выбери нужное:');
      $('#places').scrollIntoView({ behavior: 'smooth' });
    }
  } catch (e) {
    $('#story').textContent = 'Сбой распознавания: ' + e.message;
    stopBg();
  }
}

// собираем факты об ОДНОМ объекте из нескольких языковых Wikipedia (разные детали и байки)
async function getFacts(title) {
  const api = (host, params) => fetch(`https://${host}/w/api.php?${params}&format=json&origin=*`).then(r => r.json());
  const extractOf = pages => { const p = Object.values(pages || {})[0] || {}; return { text: p.extract || '', langlinks: p.langlinks || [], missing: !!p.missing }; };
  const wpExtract = (host, t) => api(host, `action=query&prop=extracts&explaintext=1&exsectionformat=plain&redirects=1&titles=${encodeURIComponent(t)}`).then(d => extractOf(d.query?.pages).text);

  const L = wiki();
  const parts = [];

  // 1) основная статья на выбранном языке + межъязыковые ссылки на тот же объект
  const main = await api(`${L}.wikipedia.org`, `action=query&prop=extracts|langlinks&explaintext=1&exsectionformat=plain&lllimit=500&redirects=1&titles=${encodeURIComponent(title)}`);
  let m = extractOf(main.query?.pages);
  log('Wikipedia ' + L, '"' + title + '"', 'len=' + m.text.length, m.missing ? '(нет статьи)' : '');
  // подстраховка: если по точному заголовку пусто — ищем настоящую статью в том же языке
  if (m.text.length <= 150) {
    const city = $('#city').value.trim();
    const cq = title.replace(/\([^)]*\)/g, ' ').replace(/[.,;:!?«»"'()\[\]]/g, ' ').replace(/\s+/g, ' ').trim() + (city ? ' ' + city : '');
    const s = await api(`${L}.wikipedia.org`, `action=query&list=search&srsearch=${encodeURIComponent(cq)}&srlimit=1`);
    const alt = s.query?.search?.[0]?.title;
    if (alt && alt !== title) {
      const main2 = await api(`${L}.wikipedia.org`, `action=query&prop=extracts|langlinks&explaintext=1&exsectionformat=plain&lllimit=500&redirects=1&titles=${encodeURIComponent(alt)}`);
      const m2 = extractOf(main2.query?.pages);
      log('↳ уточнил статью:', '"' + alt + '"', 'len=' + m2.text.length);
      if (m2.text.length > 150) m = m2;
    }
  }
  if (m.text.length > 150) parts.push(`[Wikipedia ${L.toUpperCase()}]\n` + m.text.slice(0, 6000));

  // 2) тот же объект на других языках — через langlinks (точное совпадение сущности)
  const other = [];
  const pick = code => (m.langlinks.find(l => l.lang === code) || {})['*'];
  if (L !== 'en') { let en = pick('en'); if (!en) { const s = await api('en.wikipedia.org', `action=query&list=search&srsearch=${encodeURIComponent(title)}&srlimit=1`); en = s.query?.search?.[0]?.title; } if (en) other.push(['en', en]); }
  for (const c of ['de', 'fr', 'lv']) { const t = pick(c); if (t) other.push([c, t]); }

  for (const [code, t] of other.slice(0, 3)) {
    const e = await wpExtract(`${code}.wikipedia.org`, t);
    log('Wikipedia ' + code, '"' + t + '"', 'len=' + e.length);
    if (e.length > 150) parts.push(`[Wikipedia ${code.toUpperCase()}]\n` + e.slice(0, 3500));
  }

  const combined = parts.join('\n\n---\n\n');
  log('источников собрано:', parts.length, '| всего символов:', combined.length);
  return combined;
}

// общие правила рассказа (достоверность, ударения, числа) — для зачина и продолжения
const STORY_RULES = `Правила:
- Опирайся ТОЛЬКО на факты ниже; не выдумывай дат, имён, событий, которых в них нет.
- Разные версии — озвучь обе («по одним данным… по другим…»). Легенду называй легендой, но рассказывай.
- Живо и конкретно: годы, имена, события, детали. Без общих слов вроде «древнее здание с богатой историей».
- Обращайся на «ты». Без markdown — только сплошной текст для озвучки.
- В омографах (стре́лки/стрелки́, за́мок/замо́к, о́рган/орга́н) ставь знак ударения (U+0301) сразу после ударной гласной; обычные слова не помечай.
- ВСЕ числа — прописью словами, без цифр и римских цифр. Годы одним полным числительным: «1812» → «тысяча восемьсот двенадцатый» (НЕ «восемнадцать двенадцать»). Проверь: цифр в тексте не осталось.`;

// потоковый запрос к Claude: onDelta(кусок) вызывается по мере генерации; возвращает полный текст
async function claudeStream(prompt, maxTokens, onDelta) {
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'content-type': 'application/json', 'x-api-key': key.value.trim(),
               'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
    body: JSON.stringify({ model: 'claude-sonnet-4-6', max_tokens: maxTokens, stream: true, messages: [{ role: 'user', content: prompt }] })
  });
  if (!res.ok) { const b = await res.text(); throw new Error('Claude ' + res.status + ' ' + b.slice(0, 120)); }
  const reader = res.body.getReader();
  const dec = new TextDecoder();
  let buf = '', full = '';
  for (;;) {
    const { value, done } = await reader.read();
    if (done) break;
    buf += dec.decode(value, { stream: true });
    let nl;
    while ((nl = buf.indexOf('\n')) >= 0) {
      const line = buf.slice(0, nl).trim(); buf = buf.slice(nl + 1);
      if (!line.startsWith('data:')) continue;
      const payload = line.slice(5).trim();
      if (payload === '[DONE]') continue;
      let ev; try { ev = JSON.parse(payload); } catch { continue; }
      if (ev.type === 'content_block_delta' && ev.delta && ev.delta.type === 'text_delta') { full += ev.delta.text; onDelta(ev.delta.text); }
      if (ev.type === 'error') throw new Error(ev.error?.message || 'stream error');
    }
  }
  return full.replace(/\s*[—–]\s*/g, ', ').trim();
}

// стримим генерацию прямо в очередь озвучки: готовые предложения (кусками ≥300 знаков) уходят в TTS сразу
async function streamToNarration(prompt, maxTokens, narration, onText, prefix = '') {
  let pending = '', shown = '';
  const flush = () => {
    // режем по концу предложения, идущему после ~60 знаков: короткие фразы группируются, кусок уходит быстро
    for (;;) {
      const re = /[.!?…]["»)]?(\s|$)/g;
      let cut = -1, m;
      while ((m = re.exec(pending))) { if (m.index >= 60) { cut = m.index + m[0].length; break; } }
      if (cut < 0) break;
      narration.push(pending.slice(0, cut));       // ← кусок уходит в синтез немедленно
      shown += pending.slice(0, cut);
      pending = pending.slice(cut);
    }
  };
  const full = await claudeStream(prompt, maxTokens, delta => {
    pending += delta;
    flush();
    if (onText) onText(prefix + shown + pending);
  });
  if (pending.trim()) narration.push(pending);   // хвост
  return full;
}

// очередь озвучки: в неё дозагружают текст (зачин, потом продолжение), она озвучивает на лету с предзагрузкой
function makeNarration() {
  const token = playToken;
  const jobs = [];            // упорядоченный список { text, p }: синтез каждого куска СТАРТУЕТ сразу при push, параллельно
  let ended = false, wake = null, i = 0;
  const notify = () => { if (wake) { const w = wake; wake = null; w(); } };
  const push = text => {
    for (const c of splitChunks(forTTS(text), 800)) jobs.push({ text: c, p: ttsSynth(c).catch(e => ({ err: e })) });
    notify();
  };
  const finish = () => { ended = true; notify(); };
  (async () => {
    while (playToken === token) {
      if (i >= jobs.length) { if (ended) break; await new Promise(r => (wake = r)); continue; }
      const job = jobs[i++];
      const url = await job.p;                    // почти всегда уже готово — синтез шёл параллельно, пока играли предыдущие
      if (playToken !== token) return;
      if (url && url.err) { $('#voiceStatus').textContent = `⚠️ Голос: ${url.err.message} — робот.`; await browserSpeak(job.text); }
      else { $('#voiceStatus').textContent = '🔊 Голос OpenAI'; await playUrl(url); }
      if (playToken !== token) return;
    }
  })();
  return { push, finish };
}

// шаг 1: выбор длины после тапа по месту
function askLength(title) {
  if (!key.value) { alert('Сначала впиши ключ Anthropic в настройках ⚙️'); $('#setup').open = true; return; }
  ++playToken; stopSpeak(); stopBg();
  $('#player').classList.remove('hidden');
  $('#title').textContent = title;
  $('#voiceStatus').textContent = '';
  const box = $('#story'); box.textContent = '';
  const q = document.createElement('div'); q.style.marginBottom = '8px';
  q.textContent = `Насколько подробно рассказать про «${title}»?`;
  const row = document.createElement('div'); row.className = 'row';
  [['short', '🐇 Коротко'], ['medium', '🚶 Средне'], ['long', '📖 Подробно']].forEach(([val, label]) => {
    const b = document.createElement('button'); b.className = 'sec'; b.textContent = label;
    b.onclick = () => tellProgressive(title, val);
    row.appendChild(b);
  });
  box.appendChild(q); box.appendChild(row);
  $('#player').scrollIntoView({ behavior: 'smooth' });
}

// шаг 2: зачин (одинаковый для всех длин) звучит сразу; продолжение догружается в фоне
async function tellProgressive(title, length) {
  const myToken = ++playToken;
  stopSpeak(); startBg();
  $('#title').textContent = title;
  $('#voiceStatus').textContent = '';
  $('#story').textContent = 'Собираю факты…';
  log('▶ рассказ:', '"' + title + '"', '| длина=' + length + ' | источник=' + wiki());

  const narration = makeNarration();
  // мгновенное интро — звучит сразу под музыку, пока собираются факты и пишется зачин
  const intros = [`Отлично! Сейчас посмотрю, что известно про ${title}…`,
                  `${title}. Хороший выбор. Секунду, соберу самое интересное…`,
                  `Про ${title}? С удовольствием. Дай-ка загляну в историю…`];
  narration.push(intros[Math.floor(Math.random() * intros.length)]);

  let facts = await getFacts(title);
  if (playToken !== myToken) return;
  if (!facts || facts.length < 150) { $('#story').textContent = 'По этому месту в Wikipedia мало данных — выбери другое.'; log('✖ нет фактов'); narration.finish(); stopBg(); return; }
  facts = facts.slice(0, 12000);

  const base = `Ты — живой городской рассказчик для туриста у объекта «${title}». Язык: ${$('#storyLang').value}. Стиль: ${$('#style').value}.\n${STORY_RULES}\n\nФАКТЫ ОБ ОБЪЕКТЕ (из нескольких Wikipedia на разных языках, помечены [Wikipedia XX] — объедини самое интересное, не повторяйся):\n${facts}`;

  // ЗАЧИН — стримим: первые предложения уходят в озвучку через пару секунд; одинаков для любой длины
  $('#story').textContent = 'Рассказываю…';
  let opening;
  try {
    opening = await streamToNarration(
      base + `\n\nЗАДАНИЕ: напиши ЗАЧИН рассказа — сильное живое начало на 3–4 предложения (около 30–40 секунд звучания). Это только вступление, впереди продолжение: не подводи итоги и не прощайся.`,
      700, narration, txt => { if (playToken === myToken) $('#story').textContent = txt; });
  } catch (e) { if (playToken !== myToken) return; $('#story').textContent = 'Ошибка: ' + e.message; log('✖ зачин:', e.message); narration.finish(); stopBg(); return; }
  if (playToken !== myToken) return;
  log('✓ зачин готов, символов:', opening.length);

  if (length === 'short') { narration.finish(); $('#story').textContent = opening; return; }

  // ПРОДОЛЖЕНИЕ — тоже стримим в ту же очередь, пока звучит зачин; куски озвучиваются по мере готовности
  const more = length === 'medium' ? 'ещё примерно на 2–3 минуты' : 'ещё примерно на 8–10 минут';
  try {
    const cont = await streamToNarration(
      base + `\n\nВот НАЧАЛО рассказа, которое уже звучит:\n«${opening}»\n\nЗАДАНИЕ: ПРОДОЛЖИ рассказ ${more}, НЕ повторяя и НЕ пересказывая начало. Плавно подхвати и углубись: детали, истории, люди, эпизоды, атмосфера. Заверши коротким выразительным финалом.`,
      4000, narration, txt => { if (playToken === myToken) $('#story').textContent = txt; }, opening + '\n\n');
    if (playToken !== myToken) return;
    log('✓ продолжение готово, символов:', cont.length);
  } catch (e) {
    if (playToken === myToken) log('✖ продолжение:', e.message);   // зачин уже прозвучал — не критично
  } finally {
    narration.finish();
  }
}

let audio = null; // текущий ElevenLabs-аудиоэлемент
let playToken = 0;            // инвалидирует циклы озвучки при Стоп/новом запросе
let speakResolve = null;      // резолвер текущей озвучки (чтобы await не зависал при остановке)
const sleep = ms => new Promise(r => setTimeout(r, ms));
function settleSpeak() { if (speakResolve) { const r = speakResolve; speakResolve = null; r(); } }

// фоновая музыка
const bg = $('#bg');
$('#musicFile').addEventListener('change', e => {
  const f = e.target.files[0];
  if (f) bg.src = URL.createObjectURL(f);
});
// генеративный эмбиент-пэд (по умолчанию, без файла) — мягкое трезвучие с медленным фильтром
let actx = null, pad = null;
function startPad() {
  actx = actx || new (window.AudioContext || window.webkitAudioContext)();
  if (actx.state === 'suspended') actx.resume();
  if (pad) return;
  const master = actx.createGain(); master.gain.value = 0.05; master.connect(actx.destination);
  const filter = actx.createBiquadFilter(); filter.type = 'lowpass'; filter.frequency.value = 500; filter.connect(master);
  const lfo = actx.createOscillator(); lfo.frequency.value = 0.04;       // медленное «дыхание»
  const lfoGain = actx.createGain(); lfoGain.gain.value = 220;
  lfo.connect(lfoGain); lfoGain.connect(filter.frequency); lfo.start();
  const oscs = [110, 164.81, 220].map((f, i) => {                        // A2 · E3 · A3
    const o = actx.createOscillator(); o.type = 'sine'; o.frequency.value = f; o.detune.value = i * 4;
    const g = actx.createGain(); g.gain.value = 0.5; o.connect(g); g.connect(filter); o.start(); return o;
  });
  pad = { oscs, lfo };
}
function stopPad() { if (!pad) return; pad.oscs.forEach(o => o.stop()); pad.lfo.stop(); pad = null; }

function startBg() {
  if (bg.src) { bg.volume = 0.057; bg.currentTime = 0; bg.play().catch(() => {}); }  // свой файл, если выбран
  else startPad();                                                                   // иначе — генеративный пэд
}
function stopBg() { bg.pause(); stopPad(); }

function stopSpeak() { speechSynthesis.cancel(); if (audio) { audio.pause(); audio = null; } settleSpeak(); }

const cleanKey = s => (s || '').replace(/[^\x21-\x7E]/g, '');       // заголовки принимают только ASCII
const forTTS = t => t.replace(/\s*[—–]\s*/g, ', ');                // тире звучат странно → пауза-запятая

// синтез одного куска через OpenAI → URL аудио (бросает исключение при ошибке)
async function ttsSynth(text) {
  const oaKey = cleanKey($('#openaiKey').value);
  if (!oaKey) throw new Error('нет ключа OpenAI');
  const res = await fetch('https://api.openai.com/v1/audio/speech', {
    method: 'POST',
    headers: { 'Authorization': 'Bearer ' + oaKey, 'content-type': 'application/json' },
    body: JSON.stringify({
      model: 'gpt-4o-mini-tts',
      voice: $('#ttsVoice').value || 'onyx',
      input: text,
      response_format: 'mp3',
      instructions: $('#ttsInstructions').value.trim() || 'Читай по-русски, без иностранного акцента, тёплым неспешным голосом экскурсовода.'
    })
  });
  if (!res.ok) { const b = await res.text(); log('✖ TTS', res.status, b.slice(0, 120)); throw new Error('TTS ' + res.status); }
  return URL.createObjectURL(await res.blob());
}

// проиграть готовый URL; промис резолвится по окончании (или при Стоп через settleSpeak)
function playUrl(url) {
  return new Promise(resolve => {
    audio = new Audio(url);
    speakResolve = resolve;
    audio.onended = settleSpeak;
    audio.onerror = settleSpeak;
    audio.play().catch(() => settleSpeak());
  });
}

// короткая озвучка (интро, заглушки): один кусок, при сбое — браузерный робот
async function speak(text) {
  stopSpeak();
  text = forTTS(text);
  if (!cleanKey($('#openaiKey').value)) return browserSpeak(text);
  try {
    const url = await ttsSynth(text);
    $('#voiceStatus').textContent = '🔊 Голос OpenAI (gpt-4o-mini-tts)';
    return playUrl(url);
  } catch (e) {
    $('#voiceStatus').textContent = `⚠️ Голос: ${e.message} — включён робот.`;
    return browserSpeak(text);
  }
}

// режем длинный текст на куски по границам предложений (< maxLen символов)
function splitChunks(text, maxLen = 3500) {
  const sentences = text.match(/[^.!?…]*[.!?…]+["»)]*\s*|\S[^.!?…]*$/g) || [text];
  const chunks = []; let cur = '';
  for (const s of sentences) {
    if (cur && (cur + s).length > maxLen) { chunks.push(cur.trim()); cur = ''; }
    cur += s;
  }
  if (cur.trim()) chunks.push(cur.trim());
  return chunks;
}

// длинная озвучка (рассказ): на лету — первый кусок звучит, пока синтезируются следующие
async function speakLong(text) {
  stopSpeak();
  text = forTTS(text);
  if (!cleanKey($('#openaiKey').value)) return browserSpeak(text);
  const chunks = splitChunks(text, 3500);
  log('🔊 рассказ: ' + chunks.length + ' кусок(ов)');
  const myToken = playToken;
  let nextP = ttsSynth(chunks[0]).catch(e => ({ err: e }));
  for (let i = 0; i < chunks.length; i++) {
    const url = await nextP;
    if (playToken !== myToken) return;                              // Стоп/новый запрос
    if (url && url.err) {                                           // сбой синтеза → робот на остаток
      $('#voiceStatus').textContent = `⚠️ Голос: ${url.err.message} — включён робот.`;
      return browserSpeak(chunks.slice(i).join(' '));
    }
    if (i + 1 < chunks.length) nextP = ttsSynth(chunks[i + 1]).catch(e => ({ err: e }));  // предзагрузка следующего
    $('#voiceStatus').textContent = `🔊 Голос OpenAI (${i + 1}/${chunks.length})`;
    await playUrl(url);
    if (playToken !== myToken) return;
  }
}

function browserSpeak(text) {
  const map = { 'русском': 'ru', 'английском': 'en', 'латышском': 'lv' };
  const code = map[$('#storyLang').value] || 'ru';
  const u = new SpeechSynthesisUtterance(text);
  u.lang = code;
  const v = speechSynthesis.getVoices().find(v => v.lang.startsWith(code));
  if (v) u.voice = v;
  return new Promise(r => { speakResolve = r; u.onend = settleSpeak; u.onerror = settleSpeak; speechSynthesis.speak(u); });
}
$('#speak').onclick = () => { const t = $('#story').textContent; if (t) speakLong(t); };
$('#stop').onclick = () => { playToken++; stopSpeak(); stopBg(); };
speechSynthesis.onvoiceschanged = () => {}; // прогреть список голосов
</script>
